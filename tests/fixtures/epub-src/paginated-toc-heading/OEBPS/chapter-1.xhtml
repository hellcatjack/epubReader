    <h1>Prelude</h1>
    <p>The launch bay stayed bright all night, and every panel along the corridor hummed softly enough to make sleep feel optional.</p>
    <p>Cadets crossed the floor with their bags half-zipped, each one pretending not to notice how quickly the silence between announcements kept tightening.</p>
